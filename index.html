<!doctype html>
<html lang="hr">

<head>
	<meta charset="utf-8" />
	<meta content="width=device-width, initial-scale=1" name="viewport" />
	<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;700;900&display=swap"
		rel="stylesheet" />
	<link href="style.css" rel="stylesheet" />
	<title>🧠 Memory Igra</title>
</head>

<body>

	<!-- Floating background decorations -->
	<div class="bg-decorations" id="bg-decorations"></div>

	<main class="content">

		<header class="header">
			<h1 class="title">🧠 Memory Igra</h1>
			<div class="stats">
				<div class="stat-box">
					<span class="stat-icon">🎯</span>
					<span class="stat-label">Potezi</span>
					<span class="stat-value" id="moves-count">0</span>
				</div>
				<div class="stat-box">
					<span class="stat-icon">⏱️</span>
					<span class="stat-label">Vrijeme</span>
					<span class="stat-value" id="timer">0:00</span>
				</div>
			</div>
		</header>

		<div class="difficulty-bar">
			<button class="diff-btn active" data-difficulty="easy">😊 Lako</button>
			<button class="diff-btn" data-difficulty="medium">🤔 Srednje</button>
			<button class="diff-btn" data-difficulty="hard">🔥 Teško</button>
		</div>

		<section class="card-container easy" id="card-container"></section>

		<button class="start-btn" id="start-btn">🎮 Nova Igra</button>

	</main>

	<!-- Result overlay -->
	<div class="overlay" id="overlay">
		<div class="result-card">
			<div class="result-emoji" id="result-emoji">🎉</div>
			<h2 class="result-title" id="result-title">Bravo!</h2>
			<div class="result-stars" id="result-stars"></div>
			<p class="result-info" id="result-info"></p>
			<button class="play-again-btn" id="play-again-btn">🎮 Igraj Opet</button>
		</div>
	</div>

	<!-- Confetti canvas -->
	<canvas id="confetti-canvas"></canvas>

	<script src="./script.js"></script>

</body>

</html>
